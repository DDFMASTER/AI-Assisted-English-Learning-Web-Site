# ============================================
# EngliAI — 应用配置文件（模板）
# 使用说明：
#   1. 复制此文件为 config.properties
#   2. 填入真实的密钥和密码
#   3. config.properties 已加入 .gitignore，不会被提交
# ============================================

# ===== AI 服务配置（DeepSeek API）=====
ai.api.url=https://api.deepseek.com/chat/completions
ai.api.key=YOUR_DEEPSEEK_API_KEY_HERE
ai.api.model=deepseek-v4-flash
ai.api.timeout_seconds=15

# ===== 词汇测试 AI 配置（支持独立 key，留空则使用 ai.api.key）=====
vocabtest.ai.api.key=

# ===== 数据库配置 =====
db.url=jdbc:mysql://YOUR_HOST:3306/aaeldb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=10000
db.username=YOUR_DB_USERNAME
db.password=YOUR_DB_PASSWORD

# ===== HikariCP 连接池配置 =====
db.pool.maximumPoolSize=20
db.pool.minimumIdle=5
db.pool.idleTimeout=300000
db.pool.maxLifetime=1200000

# ===== 业务配置 =====
default.password=123456
vip.cost.per.day=180
session.timeout.minutes=30
